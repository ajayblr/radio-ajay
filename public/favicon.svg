<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="40" height="40" rx="10" fill="url(#bg)"/>
  <rect width="40" height="40" rx="10" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Signal arcs -->
  <path d="M 9 28 A 13 13 0 0 1 31 28" stroke="#1DB954" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.45"/>
  <path d="M 12.5 28 A 9 9 0 0 1 27.5 28" stroke="#1DB954" stroke-width="2.4" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M 16 28 A 5 5 0 0 1 24 28" stroke="#1DB954" stroke-width="2.6" stroke-linecap="round" fill="none"/>

  <!-- Base dot -->
  <circle cx="20" cy="28" r="2.5" fill="#1DB954"/>
  <circle cx="20" cy="28" r="1.2" fill="white"/>

  <!-- Antenna -->
  <line x1="20" y1="25.5" x2="20" y2="19" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="20" cy="18" r="1.8" fill="#1DB954"/>
  <circle cx="20" cy="18" r="0.9" fill="white"/>
</svg>
